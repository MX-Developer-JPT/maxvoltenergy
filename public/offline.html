<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline · Maxvolt Energy</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, #14182a 0%, #0a0c14 70%); color: #eef1f7; padding: 24px; text-align: center;
    }
    .card { max-width: 460px; }
    .logo { width: 64px; height: 64px; margin: 0 auto 24px; border-radius: 18px; background: #FFD100; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 36px; color: #0a0c14; }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.02em; }
    p { color: #9aa1b2; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    button { background: #FFD100; color: #0a0c14; border: 0; font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 12px; cursor: pointer; }
    button:hover { background: #FFA800; }
    .bar { height: 4px; width: 160px; margin: 28px auto 0; border-radius: 999px; background: linear-gradient(90deg,#FFD100,#D97706); opacity: .5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your connection. Maxvolt Energy will be right here when you're back online.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="bar"></div>
  </div>
</body>
</html>
